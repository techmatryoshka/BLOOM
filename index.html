<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Bloom — a gentle focus app for neurodivergent minds. One task, one spell, one moment at a time.">
  <meta name="theme-color" content="#fdf6ee">

  <!-- Open Graph (for link previews) -->
  <meta property="og:title" content="Bloom 🌸">
  <meta property="og:description" content="A gentle focus app for neurodivergent minds.">
  <meta property="og:type" content="website">

  <title>Bloom 🌸 — a gentle focus spell</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=Lora:ital,wght@0,400;1,400&family=Satisfy&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="bg-layer"></div>
  <div id="floaties"></div>

  <!-- Celebration overlay -->
  <div id="celebration">
    <div class="celebrate-emoji">🌸</div>
    <h2 class="celebrate-title">You did it, darling!</h2>
    <p class="celebrate-msg" id="celebrate-msg">The fairies are so proud of you.<br>Every task done is a tiny spell cast. ✨</p>
    <div class="flowers" id="flowers-row"></div>
    <button class="btn" onclick="resetAll()">🌿 Begin anew</button>
  </div>

  <!-- Main card -->
  <div class="card">
    <span class="crown">🌸</span>
    <h1>Bloom</h1>
    <p class="subtitle">a gentle focus spell ✨</p>

    <!-- INPUT SCREEN -->
    <div id="input-screen">
      <p class="prompt">What is the one little thing<br>you're tending to right now, dear?</p>
      <textarea id="task-input" placeholder="e.g. write my lit review intro... 🌿" maxlength="140"></textarea>

      <div class="divider">choose your spell length</div>

      <div class="mode-tabs">
        <button class="tab active" onclick="selectDuration(this, 25)">🍵 25 min</button>
        <button class="tab" onclick="selectDuration(this, 15)">🌸 15 min</button>
        <button class="tab" onclick="selectDuration(this, 5)">🦋 5 min</button>
      </div>

      <button class="btn" onclick="startFocus()">🌟 cast the spell</button>
    </div>

    <!-- FOCUS SCREEN -->
    <div id="focus-screen">
      <p class="focus-hint">✨ right now, you are doing...</p>
      <div class="task-display">
        <span class="task-emoji" id="task-emoji">🌿</span>
        <span id="task-label"></span>
      </div>

      <div class="timer-wrap">
        <svg class="timer-svg" viewBox="0 0 160 160">
          <defs>
            <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e8a0b4"/>
              <stop offset="100%" stop-color="#9daf89"/>
            </linearGradient>
          </defs>
          <circle class="timer-track" cx="80" cy="80" r="70"/>
          <circle class="timer-progress" id="timer-ring" cx="80" cy="80" r="70"/>
        </svg>
        <div class="timer-text">
          <span class="timer-digits" id="timer-digits">25:00</span>
          <span class="timer-label-text">minutes of magic</span>
        </div>
        <div class="timer-fairy">🧚</div>
      </div>

      <div class="controls">
        <button class="btn" id="pause-btn" onclick="togglePause()">⏸ pause</button>
        <button class="btn btn-outline" onclick="resetAll()">🍂 end spell</button>
      </div>

      <p class="session-info" id="session-info">🌸 session 1</p>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
